name: Web CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  APP_URL: http://127.0.0.1:3000
  AUTH_SECRET: test-auth-secret-with-32-chars-min
  ENCRYPTION_KEY: test-encryption-key-with-32-chars
  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/witweb
  PG_POOL_MAX: "10"
  PG_IDLE_TIMEOUT_MS: "30000"
  PG_CONNECTION_TIMEOUT_MS: "5000"
  PG_SSL: "false"
  TURNSTILE_ENABLED: "false"
  NEXT_PUBLIC_TURNSTILE_ENABLED: "false"
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: witweb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d witweb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile is unchanged
        run: git diff --exit-code -- package-lock.json

      - name: Run database migrations
        run: npm run db:migrate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  unit:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: witweb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d witweb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Unit tests
        run: npm run test -- --run

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: witweb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d witweb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: ignore
